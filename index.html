<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Test</title><style>body{color:#ffffff;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;margin:0;padding:0;display:flex;flex-direction:column;align-items:center;background-color:black;overflow:hidden;position:relative;transition:background-color 0.5s;}header,footer{background-color:#4a148c;padding:10px;text-align:center;width:100%;z-index:1;}footer{position:fixed;bottom:0;}#connectButtonContainer{position:fixed;top:10px;right:10px;z-index:1;transition:top 0.5s;}#connectButton,.buyButton{background-color:#311b92;color:#ffffff;border:none;padding:10px 20px;cursor:pointer;border-radius:5px;transition:background-color 0.3s,transform 0.3s;}#connectButton:hover,.buyButton:hover{background-color:#4527a0;}#navigationButtons{display:flex;justify-content:center;width:100%;margin-top:20px;z-index:1;}.navButton{background-color:#311b92;color:#ffffff;border:none;padding:10px 20px;cursor:pointer;border-radius:5px;text-decoration:none;margin:0 10px;transition:background-color 0.3s;}.navButton:hover{background-color:#4527a0;}#shopSection{background-color:#000000;width:100%;padding:20px;display:flex;flex-wrap:wrap;justify-content:space-around;}.box{background-color:#311b92;color:#ffffff;border:none;padding:20px;margin:20px;text-align:center;border-radius:5px;width:30%;}.box img{width:100%;max-height:150px;object-fit:cover;margin-bottom:10px;}.buyButton{background-color:#311b92;color:#ffffff;border:none;padding:10px 20px;cursor:pointer;border-radius:5px;transition:background-color 0.3s,transform 0.3s;}.buyButton:hover{background-color:#4527a0;}#errorPopup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background-color:#ff0000;color:#ffffff;padding:15px;border-radius:5px;z-index:2;animation:fadeInOut 0.5s ease-out;}@keyframes fadeInOut{0%{opacity:0;}25%{opacity:1;}75%{opacity:1;}100%{opacity:0;}}#closeErrorButton{position:absolute;top:5px;right:10px;cursor:pointer;transition:transform 0.3s;}#closeErrorButton:hover{transform:scale(1.2);}#walletAddressDisplay{position:fixed;bottom:10px;left:10px;background-color:#008000;color:#ffffff;padding:5px;border-radius:5px;z-index:2;transition:transform 0.3s;display:none;}#walletAddressDisplay.show{display:block;}h1{font-size:1.5em;}footer p{font-size:0.8em;}@media (max-width:768px){#connectButtonContainer{top:30px;}#connectButton{margin-right:0;}#navigationButtons{flex-direction:column;}.navButton{margin:5px 0;}.box{width:100%;}}</style></head><body><header><h1 style="color: #ffffff;">Test</h1></header><div id="connectButtonContainer"><button id="connectButton" onclick="toggleMetamaskConnection()">Connect Metamask</button></div><div id="navigationButtons"><a href="home.html" class="navButton">Home</a><a href="my-nfts.html" class="navButton">My NFTs</a><button class="navButton" onclick="window.location.href='shop.html'">Buy Box</button><a href="marketplace.html" class="navButton">Marketplace</a><button class="navButton" onclick="window.location.href='money.html'">Saques e Depósitos</button></div><footer><p>Test</p></footer><div id="errorPopup"><div id="closeErrorButton" onclick="closeErrorPopup()">X</div><p id="errorMessage"></p></div><div id="walletAddressDisplay" class="show"></div><button id="saldoButton" style="position:fixed;bottom:10px;right:10px;background-color:#4a148c;color:#ffffff;border:none;padding:10px 20px;cursor:pointer;border-radius:5px;transition:background-color 0.3s,transform 0.3s;" onclick="showBalancePopup()">Saldo</button><div id="balancePopup" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background-color:#000;color:#ffffff;padding:15px;border-radius:5px;z-index:2;"><div onclick="hideBalancePopup()" style="position:absolute;top:5px;right:10px;cursor:pointer;transition:transform 0.3s;">X</div><p id="balanceDisplay">BNB:0.0</p></div><script>const contractAddress='0xf85a53b33150bd25a2eee53a94032e38642a19d5';const contractABI=[{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"_from","type":"address"},{"indexed":false,"internalType":"uint256","name":"_value","type":"uint256"}],"name":"Deposit","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"_to","type":"address"},{"indexed":false,"internalType":"uint256","name":"_value","type":"uint256"}],"name":"Withdrawal","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"owner","type":"address"},{"indexed":true,"internalType":"uint256","name":"tokenId","type":"uint256"}],"name":"NFTMinted","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"internalType":"address","name":"owner","type":"address"},{"indexed":true,"internalType":"uint256","name":"tokenId","type":"uint256"},{"indexed":false,"internalType":"uint256","name":"reward","type":"uint256"}],"name":"RewardClaimed","type":"event"},{"inputs":[],"name":"balances","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"boxPriceBNB","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"distributeDailyProfit","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"getBalance","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"lastWithdrawalTime","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"mintNFT","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"nftRarities","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"nftRewards","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"owner","outputs":[{"internalType":"address payable","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"pendingWithdrawalWallet","outputs":[{"internalType":"address payable","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"profitWallet","outputs":[{"internalType":"address payable","name":"","type":"address"}],"stateMutability":"view","type":"function"},{"inputs":[{"internalType":"uint256","name":"_amount","type":"uint256"}],"name":"withdraw","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"name":"buyBoxAndMintNFT","outputs":[],"stateMutability":"payable","type":"function"},{"inputs":[{"internalType":"uint256","name":"_tokenId","type":"uint256"}],"name":"claimReward","outputs":[],"stateMutability":"nonpayable","type":"function"}];async function checkMetamaskConnection(){if(window.ethereum){try{const accounts=await window.ethereum.request({method:'eth_accounts'});if(accounts.length>0){showWalletAddress();hideConnectButton();console.log('Connected to Metamask on BSC Testnet!');}else{hideWalletAddress();showConnectButton();console.log('Disconnected from Metamask');}}catch(error){showErrorPopup('Error interacting with Metamask: '+error);}}else{showErrorPopup('Metamask not installed.');}}checkMetamaskConnection();window.ethereum.on('accountsChanged',function(accounts){if(accounts.length===0){hideWalletAddress();showConnectButton();console.log('Disconnected from Metamask manually.');}else{showWalletAddress();hideConnectButton();console.log('Connected to Metamask on BSC Testnet!');}});async function toggleMetamaskConnection(){if(window.ethereum){try{const accounts=await window.ethereum.request({method:'eth_accounts'});if(accounts.length===0){await window.ethereum.request({method:'wallet_addEthereumChain',params:[{chainId:'0x61',chainName:'Binance Smart Chain Testnet',rpcUrls:['https://data-seed-prebsc-1-s1.binance.org:8545/'],iconUrls:['https://bscscan.com/images/main/notice.png'],nativeCurrency:{name:'BNB',symbol:'BNB',decimals:18},}],});await window.ethereum.request({method:'eth_requestAccounts'});showWalletAddress();hideConnectButton();console.log('Connected to Metamask on BSC Testnet!');}else{hideWalletAddress();showConnectButton();console.log('Disconnected from Metamask');}}catch(error){showErrorPopup('Error interacting with Metamask: '+error);}}else{showErrorPopup('Metamask not installed.');}}function showConnectButton(){const connectButton=document.getElementById('connectButton');connectButton.style.display='block';}function hideConnectButton(){const connectButton=document.getElementById('connectButton');connectButton.style.display='none';}function showWalletAddress(){const walletAddressDisplay=document.getElementById('walletAddressDisplay');const accounts=window.ethereum.selectedAddress;walletAddressDisplay.innerText='Connected Wallet Address: '+accounts;walletAddressDisplay.classList.add('show');}function hideWalletAddress(){const walletAddressDisplay=document.getElementById('walletAddressDisplay');walletAddressDisplay.classList.remove('show');}function showErrorPopup(message){document.getElementById('errorMessage').innerText=message;document.getElementById('errorPopup').style.display='block';}function closeErrorPopup(){document.getElementById('errorPopup').style.display='none';}async function deposit(){const depositAmount=document.getElementById('depositAmount').value;if(depositAmount>=0.02&&depositAmount<=1){const accounts=await window.ethereum.request({method:'eth_accounts'});const contract=new window.ethereum.Contract(contractABI,contractAddress);await contract.methods.deposit().send({from:accounts[0],value:web3.utils.toWei(depositAmount.toString(),'ether')});const balance=await contract.methods.getBalance().call();const walletAddressDisplay=document.getElementById('walletAddressDisplay');walletAddressDisplay.innerText='Connected Wallet Address: '+accounts[0]+' | Balance: '+web3.utils.fromWei(balance.toString(),'ether')+' BNB';}else{console.log('Valor de depósito não está dentro do intervalo permitido.');}}async function withdraw(){const withdrawAmount=document.getElementById('withdrawAmount').value;if(withdrawAmount>=0.02&&withdrawAmount<=1){const accounts=await window.ethereum.request({method:'eth_accounts'});const contract=new window.ethereum.Contract(contractABI,contractAddress);await contract.methods.withdraw(web3.utils.toWei(withdrawAmount.toString(),'ether')).send({from:accounts[0]});const balance=await contract.methods.getBalance().call();const walletAddressDisplay=document.getElementById('walletAddressDisplay');walletAddressDisplay.innerText='Connected Wallet Address: '+accounts[0]+' | Balance: '+web3.utils.fromWei(balance.toString(),'ether')+' BNB';}else{console.log('Valor de saque não está dentro do intervalo permitido.');}}async function showBalancePopup(){const accounts=await window.ethereum.request({method:'eth_accounts'});const contract=new window.ethereum.Contract(contractABI,contractAddress);const balance=await contract.methods.getBalance().call();const balancePopup=document.getElementById('balancePopup');const balanceDisplay=document.getElementById('balanceDisplay');balanceDisplay.innerText='BNB: '+web3.utils.fromWei(balance.toString(),'ether');balancePopup.style.display='block';}function hideBalancePopup(){const balancePopup=document.getElementById('balancePopup');balancePopup.style.display='none';}</script></body></html>
